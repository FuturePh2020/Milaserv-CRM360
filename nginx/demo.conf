# Free public demo gateway. This is the ONLY service that publishes a port
# to the host (see docker-compose.demo.yml) - postgres/redis/api/worker/web
# all stay on the internal Docker network, unreachable from outside it.
#
# Same-origin design: the browser only ever talks to this gateway. `/` goes
# to the Next.js app, `/api/` goes to the NestJS API with the prefix
# stripped. This means the web app's NEXT_PUBLIC_API_URL is baked to `/api`
# at build time (see apps/web/Dockerfile build args) - no cross-origin
# requests, no CORS preflight, and the refresh-token httpOnly cookie works
# exactly the same way it does in local dev, just same-origin instead of
# cross-port.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  client_max_body_size 60m; # must be >= UPLOAD_MAX_FILE_SIZE_MB

  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:4000;
  }

  server {
    listen 8080;
    server_name _;

    # Health check for the gateway itself (used by `docker compose ps`/
    # Cloudflare Quick Tunnel's own reachability check).
    location /gateway-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Server-Sent Events (spec 19's real-time overview stream): must not be
    # buffered, or the browser never sees anything until the connection
    # eventually closes.
    location /api/dashboards/overview/stream {
      proxy_pass http://api_upstream/dashboards/overview/stream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
    }

    location /api/ {
      proxy_pass http://api_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
      proxy_pass_header Set-Cookie;
    }

    # Next.js dev/prod HMR and RSC payloads use WebSocket upgrades in some
    # modes - proxy the upgrade headers for every route, not just /api.
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
